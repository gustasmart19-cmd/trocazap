<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrocaZap</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#25D366;
color:white;
padding:20px;
text-align:center;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:90%;
max-width:500px;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.btn{
background:#25D366;
color:white;
padding:10px 15px;
border-radius:6px;
text-decoration:none;
display:inline-block;
}

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>
</head>

<body>

<header>
<h1>TrocaZap</h1>
<p>Encontre grupos e contatos do WhatsApp</p>
</header>

<div class="search">
<input type="text" placeholder="Pesquisar grupos ou contatos">
</div>

<div class="container">

<div class="card">
<h3>Grupo GTA VI Brasil</h3>
<p>Novidades e discussões sobre GTA VI.</p>
<a href="#" class="btn">Entrar</a>
</div>

<div class="card">
<h3>Grupo Xbox Brasil</h3>
<p>Promoções e Game Pass.</p>
<a href="#" class="btn">Entrar</a>
</div>

<div class="card">
<h3>Contato para Troca de Jogos</h3>
<p>Usuário verificado.</p>
<a href="#" class="btn">WhatsApp</a>
</div>

</div>

<footer>
© 2026 TrocaZap
</footer>

</body>
</html>
